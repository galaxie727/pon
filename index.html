<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>デカブサジャラポン × チー娘</title>
<style>
  *{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
  }
  html,body{
    margin:0;
    padding:0;
    width:100%;
    min-height:100%;
    background:#05070c;
    color:#fff;
    font-family:sans-serif;
  }
  body{
    display:flex;
    justify-content:center;
  }
  .app{
    width:100%;
    max-width:430px;
    min-height:100vh;
    background:
      radial-gradient(circle at top, rgba(255,255,255,.06), transparent 30%),
      linear-gradient(180deg,#10131d 0%,#06080d 100%);
    padding:12px 10px 18px;
  }
  .title{
    text-align:center;
    font-size:24px;
    font-weight:900;
    letter-spacing:.04em;
    margin:4px 0 12px;
  }
  .panel{
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.07);
    border-radius:22px;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
  }

  .statusBox{
    padding:14px 14px 10px;
    margin-bottom:12px;
  }
  .statusTop{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
    font-size:14px;
    font-weight:800;
    margin-bottom:10px;
  }
  .statusMain{
    text-align:center;
    font-size:18px;
    font-weight:900;
    min-height:26px;
    margin-bottom:8px;
  }
  .subInfo{
    text-align:center;
    font-size:12px;
    opacity:.75;
    min-height:18px;
  }

  .scoreWrap{
    padding:12px;
    margin-bottom:12px;
  }
  .scoreTitle{
    font-size:14px;
    font-weight:900;
    margin-bottom:10px;
  }
  .scoreList{
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .scoreLine{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 12px;
    background:rgba(255,255,255,.05);
    border-radius:14px;
    font-size:14px;
    font-weight:900;
  }
  .scoreLine.active{
    outline:2px solid rgba(255,255,255,.12);
  }
  .scoreName{
    display:flex;
    align-items:center;
    gap:8px;
  }
  .scoreBadge{
    min-width:22px;
    height:22px;
    border-radius:999px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
    font-weight:900;
    color:#111;
  }
  .badge-you{ background:#fff; }
  .badge-a{ background:#ffbfdc; }
  .badge-b{ background:#bedcff; }
  .badge-c{ background:#d6ffb8; }

  .topArea{
    padding:12px;
    margin-bottom:12px;
  }
  .topGrid{
    display:grid;
    grid-template-columns:116px 1fr;
    gap:10px;
    align-items:stretch;
  }
  .wallBox,
  .riverBox{
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.06);
    border-radius:18px;
    padding:12px;
  }
  .topTitle{
    font-size:13px;
    font-weight:900;
    margin-bottom:8px;
  }
  .wallInner{
    min-height:124px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:8px;
  }
  .wallCount{
    font-size:40px;
    font-weight:900;
    line-height:1;
  }
  .wallSub{
    font-size:12px;
    opacity:.78;
  }

  .riverHead{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
    margin-bottom:8px;
  }
  .riverOwner{
    font-size:12px;
    opacity:.82;
    text-align:right;
  }
  .riverColumnHeads{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:6px;
    margin-bottom:8px;
  }
  .riverColHead{
    text-align:center;
    font-size:11px;
    font-weight:900;
    opacity:.82;
    padding:2px 0;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .riverGrid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:6px;
    min-height:124px;
    align-content:start;
  }
  .riverTile{
    aspect-ratio:1 / 1;
    border-radius:12px;
    overflow:hidden;
    background:#1b2130;
    border:1px solid rgba(255,255,255,.08);
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
  }
  .riverTile.last{
    outline:2px solid rgba(255,230,120,.95);
  }
  .riverImg{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }
  .riverTint{
    position:absolute;
    inset:0;
    opacity:.20;
    z-index:0;
  }
  .riverEmpty{
    min-height:124px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
    opacity:.65;
  }

  .handWrap{
    padding:12px;
    margin-bottom:12px;
  }
  .handTitle{
    font-size:14px;
    font-weight:900;
    margin-bottom:10px;
  }
  .hand{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }
  .tileBtn{
    width:86px;
    height:86px;
    border:none;
    border-radius:18px;
    overflow:hidden;
    border:1px solid rgba(255,255,255,.08);
    color:#fff;
    font-size:12px;
    font-weight:900;
    padding:0;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    position:relative;
    background:#1c2230;
  }
  .tileBtn.drawn{
    outline:2px solid rgba(255,230,120,.95);
    transform:translateY(-1px);
  }
  .tileBtn:disabled{
    opacity:.55;
  }
  .tileInner{
    width:100%;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
  }
  .tileTint{
    position:absolute;
    inset:0;
    opacity:.22;
  }
  .tileImg{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
    position:relative;
    z-index:1;
  }
  .tileFallback{
    padding:6px;
    line-height:1.25;
    position:relative;
    z-index:1;
    text-shadow:0 1px 2px rgba(0,0,0,.35);
  }

  .actionWrap{
    display:flex;
    gap:8px;
    margin-bottom:12px;
  }
  .actionBtn{
    flex:1;
    appearance:none;
    border:none;
    border-radius:16px;
    padding:14px 10px;
    font-size:15px;
    font-weight:900;
    cursor:pointer;
  }
  .actionBtn:disabled{
    opacity:.45;
    cursor:default;
  }
  #tsumoBtn{
    background:#fff;
    color:#111;
  }
  #ronBtn{
    background:#ffe59a;
    color:#111;
  }
  #passBtn{
    background:#2b3044;
    color:#fff;
    border:1px solid rgba(255,255,255,.08);
  }

  .controls{
    display:flex;
    gap:8px;
    margin-bottom:12px;
  }
  .mainBtn{
    appearance:none;
    border:none;
    border-radius:20px;
    padding:15px 14px;
    font-size:16px;
    font-weight:900;
    cursor:pointer;
  }
  #resetBtn{
    width:100%;
    background:#272b3b;
    color:#fff;
    border:1px solid rgba(255,255,255,.08);
  }

  .historyWrap{
    padding:12px;
  }
  .historyTitle{
    font-size:14px;
    font-weight:900;
    margin-bottom:10px;
  }
  .historyBox{
    max-height:220px;
    overflow:auto;
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .historyLine{
    background:rgba(255,255,255,.05);
    border-radius:12px;
    padding:10px 12px;
    font-size:13px;
    line-height:1.5;
  }

  .girlOverlay,
  .resultOverlay,
  .roundOverlay,
  .titleOverlay,
  .roundResultOverlay{
    position:fixed;
    inset:0;
    z-index:100;
    opacity:0;
    pointer-events:none;
    transition:opacity .26s ease;
  }
  .girlOverlay.show,
  .resultOverlay.show,
  .roundOverlay.show,
  .titleOverlay.show,
  .roundResultOverlay.show{
    opacity:1;
    pointer-events:auto;
  }

  .girlOverlay{
    background:#000;
    z-index:130;
  }
  .girlBg{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:center center;
    filter:brightness(.96);
  }
  .girlShade{
    position:absolute;
    inset:0;
    background:linear-gradient(180deg, rgba(0,0,0,.18) 0%, rgba(0,0,0,.02) 28%, rgba(0,0,0,.20) 100%);
  }
  .girlUi{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    justify-content:flex-end;
    padding:20px 16px max(20px, env(safe-area-inset-bottom));
  }
  .girlSpeech{
    width:100%;
    background:rgba(255,255,255,.10);
    backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px);
    color:#fff;
    border-radius:28px;
    padding:16px 16px 18px;
    border:1px solid rgba(255,255,255,.12);
    box-shadow:0 8px 24px rgba(0,0,0,.08);
  }
  .girlName{
    display:inline-block;
    margin-bottom:12px;
    padding:8px 15px;
    border-radius:999px;
    background:rgba(0,0,0,.72);
    color:#fff;
    font-size:14px;
    font-weight:900;
  }
  .girlText{
    font-size:18px;
    font-weight:900;
    line-height:1.55;
    min-height:42px;
    text-shadow:0 1px 2px rgba(0,0,0,.28);
  }

  .bigTileWrap{
    display:none;
    width:100%;
    margin:0 0 16px;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    gap:10px;
  }
  .bigTileWrap.show{
    display:flex;
  }
  .bigTileCard{
    width:min(56vw,240px);
    aspect-ratio:1 / 1;
    border-radius:28px;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    position:relative;
    border:3px solid rgba(255,255,255,.22);
    box-shadow:0 18px 36px rgba(0,0,0,.30);
    color:#fff;
    text-shadow:0 1px 2px rgba(0,0,0,.35);
    background:#1b2130;
  }
  .bigTileTint{
    position:absolute;
    inset:0;
    opacity:.28;
  }
  .bigTileImg{
    width:100%;
    height:100%;
    object-fit:cover;
    position:relative;
    z-index:1;
  }
  .bigTileFallback{
    position:relative;
    z-index:1;
    font-size:28px;
    font-weight:900;
    padding:16px;
    text-align:center;
  }
  .bigTileCaption{
    font-size:16px;
    font-weight:900;
    text-shadow:0 1px 2px rgba(0,0,0,.35);
  }

  .roundOverlay{
    z-index:110;
    background:rgba(5,7,12,.86);
  }
  .roundStage{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    gap:14px;
    padding:24px;
  }
  .roundMain{
    font-size:54px;
    font-weight:900;
    line-height:1;
    letter-spacing:.08em;
  }
  .roundSub{
    font-size:16px;
    font-weight:800;
    opacity:.9;
  }

  .roundResultOverlay{
    z-index:125;
    background:rgba(5,7,12,.88);
  }
  .roundResultBox{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    width:min(90vw,420px);
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.12);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    border-radius:28px;
    padding:24px 18px 18px;
    box-shadow:0 14px 36px rgba(0,0,0,.22);
    text-align:center;
  }
  .roundResultRound{
    font-size:18px;
    font-weight:900;
    opacity:.9;
    margin-bottom:12px;
  }
  .roundResultWin{
    font-size:30px;
    font-weight:900;
    line-height:1.25;
    margin-bottom:10px;
  }
  .roundResultDesc{
    font-size:15px;
    line-height:1.6;
    opacity:.92;
    margin-bottom:14px;
  }
  .roundResultScore{
    display:flex;
    flex-direction:column;
    gap:8px;
    margin-top:10px;
  }
  .roundResultScoreLine{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 12px;
    background:rgba(255,255,255,.05);
    border-radius:12px;
    font-size:14px;
    font-weight:800;
  }
  .nextRoundWrap{
    margin-top:14px;
  }

  .titleOverlay{
    z-index:140;
    background:
      radial-gradient(circle at top, rgba(255,255,255,.08), transparent 34%),
      linear-gradient(180deg,#0d1018 0%,#07090e 100%);
  }
  .titleScreen{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:24px 20px;
    text-align:center;
  }
  .titleLogo{
    font-size:34px;
    font-weight:900;
    line-height:1.25;
    letter-spacing:.03em;
    margin-bottom:18px;
    text-shadow:0 2px 18px rgba(0,0,0,.35);
  }
  .titleSub{
    font-size:14px;
    opacity:.82;
    line-height:1.8;
    margin-bottom:26px;
    max-width:320px;
  }
  .startBtn{
    appearance:none;
    border:none;
    border-radius:999px;
    padding:18px 34px;
    font-size:18px;
    font-weight:900;
    background:#fff;
    color:#111;
    cursor:pointer;
    box-shadow:0 10px 28px rgba(0,0,0,.25);
  }
  .titleNote{
    margin-top:18px;
    font-size:12px;
    opacity:.65;
  }

  .resultOverlay{
    z-index:120;
    background:rgba(5,7,12,.92);
  }
  .resultBox{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    width:min(92vw,430px);
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.12);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    border-radius:28px;
    padding:22px 18px 18px;
    box-shadow:0 14px 36px rgba(0,0,0,.22);
  }
  .resultTitle{
    font-size:28px;
    font-weight:900;
    text-align:center;
    margin-bottom:10px;
  }
  .resultSub{
    text-align:center;
    font-size:15px;
    opacity:.92;
    margin-bottom:16px;
    line-height:1.6;
  }
  .resultList{
    background:rgba(255,255,255,.05);
    border-radius:18px;
    padding:10px;
    margin-bottom:14px;
  }
  .resultLine{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 10px;
    border-radius:12px;
    background:rgba(255,255,255,.04);
    margin-bottom:6px;
    font-size:14px;
    font-weight:800;
  }
  .resultLine:last-child{ margin-bottom:0; }
  .resultButtons{
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .resultBtn{
    appearance:none;
    border:none;
    border-radius:18px;
    padding:16px 14px;
    font-size:16px;
    font-weight:900;
    cursor:pointer;
  }
  .resultRetry{
    background:#fff;
    color:#111;
  }

  @media (max-width:390px){
    .tileBtn{
      width:78px;
      height:78px;
    }
    .roundMain{
      font-size:46px;
    }
    .topGrid{
      grid-template-columns:104px 1fr;
    }
    .titleLogo{
      font-size:29px;
    }
    .roundResultWin{
      font-size:25px;
    }
  }
</style>
</head>
<body>
  <div class="app">
    <div class="title">デカブサジャラポン × チー娘</div>

    <div class="panel statusBox">
      <div class="statusTop">
        <span id="turnLabel">現在の番：あなた</span>
        <span id="roundLabel">東局</span>
      </div>
      <div class="statusMain" id="statusMain">ゲーム開始</div>
      <div class="subInfo" id="subInfo">通常手札5枚 / 3枚×2セットで上がり</div>
    </div>

    <div class="panel scoreWrap">
      <div class="scoreTitle">点数</div>
      <div class="scoreList" id="scoreList"></div>
    </div>

    <div class="panel topArea">
      <div class="topGrid">
        <div class="wallBox">
          <div class="topTitle">山札</div>
          <div class="wallInner">
            <div class="wallCount" id="deckCount">0</div>
            <div class="wallSub">残り枚数</div>
          </div>
        </div>

        <div class="riverBox">
          <div class="riverHead">
            <div class="topTitle">捨て牌</div>
            <div class="riverOwner" id="lastOwner">---</div>
          </div>
          <div class="riverColumnHeads" id="riverColumnHeads"></div>
          <div class="riverGrid" id="riverGrid"></div>
          <div class="riverEmpty" id="riverEmpty">まだ捨て牌はありません</div>
        </div>
      </div>
    </div>

    <div class="panel handWrap">
      <div class="handTitle">あなたの手札</div>
      <div class="hand" id="hand"></div>
    </div>

    <div class="actionWrap">
      <button class="actionBtn" id="tsumoBtn" type="button" disabled>ツモ</button>
      <button class="actionBtn" id="ronBtn" type="button" disabled>ロン</button>
      <button class="actionBtn" id="passBtn" type="button" disabled>スルー</button>
    </div>

    <div class="controls">
      <button class="mainBtn" id="resetBtn" type="button">リセット</button>
    </div>

    <div class="panel historyWrap">
      <div class="historyTitle">履歴</div>
      <div class="historyBox" id="historyBox"></div>
    </div>
  </div>

  <div class="titleOverlay show" id="titleOverlay">
    <div class="titleScreen">
      <div class="titleLogo">デカブサジャラポン<br>× チー娘</div>
      <div class="titleSub">
        デカブサたちの牌をそろえて勝負。<br>
        ツモ・ロンあり、東南西北の親回し。
      </div>
      <button class="startBtn" id="startBtn" type="button">START</button>
      <div class="titleNote">img フォルダにチー娘通常画像3枚ずつ配置</div>
    </div>
  </div>

  <div class="girlOverlay" id="girlOverlay">
    <img alt="チー娘" class="girlBg" id="girlBg">
    <div class="girlShade"></div>
    <div class="girlUi">
      <div class="bigTileWrap" id="bigTileWrap">
        <div class="bigTileCard" id="bigTileCard">
          <div class="bigTileTint" id="bigTileTint"></div>
          <div class="bigTileFallback" id="bigTileFallback">デカブサ</div>
        </div>
        <div class="bigTileCaption" id="bigTileCaption">デカブサを捨てる</div>
      </div>

      <div class="girlSpeech">
        <div class="girlName" id="girlName">チー娘A</div>
        <div class="girlText" id="girlText">いくよ。</div>
      </div>
    </div>
  </div>

  <div class="roundOverlay" id="roundOverlay">
    <div class="roundStage">
      <div class="roundMain" id="roundOverlayMain">東局</div>
      <div class="roundSub" id="roundOverlaySub">開局</div>
    </div>
  </div>

  <div class="roundResultOverlay" id="roundResultOverlay">
    <div class="roundResultBox">
      <div class="roundResultRound" id="roundResultRound">東局終了</div>
      <div class="roundResultWin" id="roundResultWin">チー娘A ロン</div>
      <div class="roundResultDesc" id="roundResultDesc">チー娘Cから2点</div>
      <div class="roundResultScore" id="roundResultScore"></div>
      <div class="nextRoundWrap">
        <button id="nextRoundBtn" class="resultBtn resultRetry" type="button">次の局へ</button>
      </div>
    </div>
  </div>

  <div class="resultOverlay" id="resultOverlay">
    <div class="resultBox">
      <div class="resultTitle" id="resultTitle">あなたの勝ち！</div>
      <div class="resultSub" id="resultSub">トップで終了しました。</div>
      <div class="resultList" id="resultList"></div>
      <div class="resultButtons">
        <button class="resultBtn resultRetry" id="retryBtn" type="button">もう一回</button>
      </div>
    </div>
  </div>

  <script>

       const START_POINT = 5;
    const BASE_HAND_SIZE = 5;
    const COPIES_PER_TILE = 6;

    const WAIT_LONG = 1450;
    const WAIT_RON_CHECK = 900;
    const WAIT_DISCARD_PREVIEW = 900;
    const WAIT_ROUND_START_GAP = 700;

    const PARENT_ORDER = ["東","南","西","北"];

    const TILES = [
      { id:"dekabusa", name:"デカブサ", color:"#e74c3c", image:"img/tile_dekabusa.png" },
      { id:"ani", name:"デカブサ兄", color:"#f1c40f", image:"img/tile_aniki.png" },
      { id:"namaken", name:"ナマケン", color:"#3498db", image:"img/tile_namaken.png" },
      { id:"tora", name:"トラさん", color:"#2ecc71", image:"img/tile_torasan.png" },
      { id:"king", name:"キング", color:"#9b59b6", image:"img/tile_king.png" },

    function shuffle(array){
      const arr = [...array];
      for(let i = arr.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;

      });
      return shuffle(arr);
    }

    function countMap(hand){
      const map = {};
      hand.forEach(tileId => {
        map[tileId] = (map[tileId] || 0) + 1;
      });
      return map;
    }

    function getCompletedTriples(hand){
      const map = countMap(hand);
      let sets = 0;
      for(const key in map){
        sets += Math.floor(map[key] / 3);
      }
      return sets;
    }

    function isWinningHand(hand){
      return getCompletedTriples(hand) >= 2;
    }

    function getBestCount(hand){
      const map = countMap(hand);
      let best = 0;
      Object.values(map).forEach(v => {
        if(v > best) best = v;
      });
      return best;
    }

      const columnStacks = [[], [], [], []];

      discardPile.forEach((item, index) => {
        const col = playerIndexMap[item.playerId];
        if(col !== undefined){
          columnStacks[col].push({
            ...item,
            isLast: index === discardPile.length - 1
          });
        }
      });

      const maxRows = Math.max(...columnStacks.map(col => col.length), 0);

      for(let row = 0; row < maxRows; row++){
        for(let col = 0; col < 4; col++){
          const item = columnStacks[col][row];
          if(item){
            const tileEl = createRiverTile(item.tileId, item.isLast);

    function cpuChooseDiscardIndex(player){
      const hand = player.hand;
      const map = countMap(hand);

      let bestScore = Infinity;
      let candidates = [];

      hand.forEach((tileId, i) => {
        const count = map[tileId];
        let score = 0;

        if(count >= 3){
          score += 1000;
        } else if(count === 2){
          score += 100;
        }

        if(getCompletedTriples(hand) >= 1 && count === 2){
          score += 80;
        }

        if(score < bestScore){
          bestScore = score;
          candidates = [i];
        } else if(score === bestScore){
          candidates.push(i);
        }
      });

      return candidates[Math.floor(Math.random() * candidates.length)];
    }

    function judgeRoundRanking(){
      const ranking = players.map(player => ({
        player,
        triples:getCompletedTriples(player.hand),
        best:getBestCount(player.hand)
      }));

      ranking.sort((a,b) => {
        if(b.triples !== a.triples) return b.triples - a.triples;
        return b.best - a.best;
      });

      const top = ranking[0];
      const sameTop = ranking.filter(r => r.triples === top.triples && r.best === top.best);

      if(sameTop.length >= 2){
        return { reason:"draw" };
      }

      return {
        reason:"best",
        winner:top.player
      };
    }

      sorted.forEach(p => {
        const row = document.createElement("div");
        row.className = "roundResultScoreLine";
        row.innerHTML = `<span>${p.seat}　${p.name}</span><span>${p.point}点</span>`;
        roundResultScore.appendChild(row);
      });
    }

    function showRoundResult(roundText, winText, descText){
      return new Promise((resolve) => {
        roundResultRound.textContent = roundText;
        roundResultWin.textContent = winText;
        roundResultDesc.textContent = descText;
        renderRoundResultScores();

        pendingNextRoundAction = resolve;
        roundResultOverlay.classList.add("show");
      });
    }

    async function showParentFlowCutin(type, targetPlayer){
      const girlIndex = targetPlayer.type === "human" ? getSupportGirlIndex() : targetPlayer.girlIndex;
      const girl = girls[girlIndex];
      const lines = type === "stay" ? girl.parentStay : type === "move" ? girl.parentMove : girl.parentStart;
      showGirl(girlIndex, rand(lines));
      await wait(1200);
      hideGirl();
      await wait(140);
    }

    async function playRoundEndByTsumo(winner){
      clearPendingActions();

      const girlIndex = winner.type === "human" ? getSupportGirlIndex() : winner.girlIndex;
      const g = girls[girlIndex];
      const parent = getParentPlayer();
      const isParentWin = winner.id === parent.id;

      await wait(500);
      showGirl(girlIndex, rand(g.tsumo));
      await wait(WAIT_LONG);
      hideGirl();

      applyTsumoPoints(winner);
      addHistory(`${getRoundName()}：${winner.seat} ${winner.name} がツモ。`);

      statusMain.textContent = `${winner.name} ツモ`;
      subInfo.textContent = `他3人から各1点`;
      renderAll();

      await showRoundResult(
        `${getRoundName()}終了`,
        `${winner.seat}　${winner.name}　ツモ`,
        "他の3人から各1点"
      );

      if(hasHako()){
        showGirl(girlIndex, rand(g.hako));
        await wait(WAIT_LONG);
        hideGirl();
        gameEnded = true;
        await showMatchFinal(getFinalWinnersByPoints());
        return;
      }

      if(isParentWin){
        await showParentFlowCutin("stay", parent);
      } else {
        await showParentFlowCutin("move", parent);
        parentSeatIndex = (parentSeatIndex + 1) % 4;
      }

      await wait(WAIT_ROUND_START_GAP);
      await startRound();
    }

    async function playRoundEndByRon(winner, discarder, tileId){
      clearPendingActions();

      const girlIndex = winner.type === "human" ? getSupportGirlIndex() : winner.girlIndex;
      const g = girls[girlIndex];
      const parent = getParentPlayer();
      const isParentWin = winner.id === parent.id;

      await wait(500);
      showGirl(girlIndex, rand(g.ron));
      await wait(WAIT_LONG);
      hideGirl();

      applyRonPoints(winner, discarder);
      addHistory(`${getRoundName()}：${winner.seat} ${winner.name} が ${discarder.seat} ${discarder.name} の ${getTileName(tileId)} でロン。`);

      statusMain.textContent = `${winner.name} ロン`;
      subInfo.textContent = `${discarder.name} から2点`;
      renderAll();

      await showRoundResult(
        `${getRoundName()}終了`,
        `${winner.seat}　${winner.name}　ロン`,
        `${discarder.seat}　${discarder.name} から2点`
      );

      if(hasHako()){
        showGirl(girlIndex, rand(g.hako));
        await wait(WAIT_LONG);
        hideGirl();
        gameEnded = true;
        await showMatchFinal(getFinalWinnersByPoints());
        return;
      }

      if(isParentWin){
        await showParentFlowCutin("stay", parent);
      } else {
        await showParentFlowCutin("move", parent);
        parentSeatIndex = (parentSeatIndex + 1) % 4;
      }

      await wait(WAIT_ROUND_START_GAP);
      await startRound();
    }

    async function playRoundDraw(){
      clearPendingActions();

      const girlIndex = getSupportGirlIndex();
      const g = girls[girlIndex];
      const parent = getParentPlayer();

      showGirl(girlIndex, rand(g.drawRound));
      await wait(WAIT_LONG);
      hideGirl();

      addHistory(`${getRoundName()}：流局。点数変動なし。`);
      statusMain.textContent = "流局";
      subInfo.textContent = "点数変動なし";
      renderAll();

      await showRoundResult(
        `${getRoundName()}終了`,
        "流局",
        "点数変動なし"
      );

      await showParentFlowCutin("move", parent);
      parentSeatIndex = (parentSeatIndex + 1) % 4;

      await wait(WAIT_ROUND_START_GAP);
      await startRound();
    }

    async function playRoundBestWin(winner){
      clearPendingActions();

      const girlIndex = winner.type === "human" ? getSupportGirlIndex() : winner.girlIndex;
      const g = girls[girlIndex];
      const parent = getParentPlayer();
      const isParentWin = winner.id === parent.id;

      showGirl(girlIndex, rand(g.tsumo));
      await wait(WAIT_LONG);
      hideGirl();

      winner.point += 1;
      addHistory(`${getRoundName()}：山札終了。${winner.seat} ${winner.name} が判定勝ち。`);

      statusMain.textContent = "山札終了";
      subInfo.textContent = `${winner.name} +1`;
      renderAll();

      await showRoundResult(
        `${getRoundName()}終了`,
        `${winner.seat}　${winner.name}　判定勝ち`,
        "山札終了 / 判定で +1点"
      );

      if(hasHako()){
        showGirl(girlIndex, rand(g.hako));
        await wait(WAIT_LONG);
        hideGirl();
        gameEnded = true;
        await showMatchFinal(getFinalWinnersByPoints());
        return;
      }

      if(isParentWin){
        await showParentFlowCutin("stay", parent);
      } else {
        await showParentFlowCutin("move", parent);
        parentSeatIndex = (parentSeatIndex + 1) % 4;
      }

      await wait(WAIT_ROUND_START_GAP);
      await startRound();
    }

    async function showMatchFinal(winners){
      if(winners.length === 1){
        const winner = winners[0];
        const girlIndex = winner.id === "you" ? getSupportGirlIndex() : winner.girlIndex;
        const lines = winner.id === "you"
          ? girls[girlIndex].finalWinYou
          : girls[girlIndex].finalWinCpu;

        showGirl(girlIndex, rand(lines));
        await wait(1850);
        hideGirl();
      } else {
        const girlIndex = getSupportGirlIndex();
        showGirl(girlIndex, "同点優勝だね。");
        await wait(1850);
        hideGirl();
      }

      showResultScreen(winners);
    }

    function getRonCandidateAfterDiscard(discarder, tileId){
      const order = getTurnOrder();
      const startIdx = order.findIndex(p => p.id === discarder.id);

      for(let offset = 1; offset < order.length; offset++){
        const candidate = order[(startIdx + offset) % order.length];
        if(canRonWithTile(candidate.hand, tileId)){
          return candidate;
        }
      }
      return null;
    }

    async function showParentStartCutin(){
      const parent = getParentPlayer();
      await showParentFlowCutin("start", parent);
    }

    async function startRound(){
      if(gameEnded) return;

      clearPendingActions();
      deck = createDeck();
      discardPile = [];
      players.forEach(p => p.hand = []);
      justDrawnIndex = -1;
      waitingPlayerDiscard = false;

      for(let i = 0; i < BASE_HAND_SIZE; i++){
        players.forEach(p => drawTile(p));
      }

      statusMain.textContent = `${getRoundName()}開始`;
      subInfo.textContent = `親：${getParentPlayer().seat} ${getParentPlayer().name}`;
      renderAll();
      addHistory(`${getRoundName()}開始。親：${getParentPlayer().seat} ${getParentPlayer().name}`);

      await showParentStartCutin();
      await showRoundIntro();
      await wait(220);

      const order = getTurnOrder();
      turnIndex = order.findIndex(p => p.seat === getCurrentParentSeat());

      await introTurn();
    }

    async function introTurn(){
      if(gameEnded) return;
      clearPendingActions();

      const player = getCurrentPlayer();
      renderAll();

      if(player.type === "human"){
        const girlIndex = getSupportGirlIndex();
        showGirl(girlIndex, rand(girls[girlIndex].introHuman));
        statusMain.textContent = `${player.seat}　あなたの番`;
        subInfo.textContent = "1枚引いて6枚→上がるか捨てる";
        await wait(WAIT_LONG);
        updateGirlText(rand(girls[girlIndex].thinkHuman));
        await wait(900);
        hideGirl();
        await wait(180);
        await playerDrawPhase(girlIndex);
      } else {
        const girlIndex = player.girlIndex;
        showGirl(girlIndex, rand(girls[girlIndex].introCpu));
        statusMain.textContent = `${player.seat}　${player.name}の番`;
        subInfo.textContent = "相手が考え中";
        await wait(WAIT_LONG);
        await cpuTurn(player, girlIndex);
      }
    }

    async function playerDrawPhase(girlIndex){
      if(gameEnded) return;

      setBusy(true);

      if(deck.length <= 0){
        hideGirl();
        await endRoundByJudgement();
        setBusy(false);
        return;
      }

      const me = players[0];
      const tileId = drawTile(me);
      justDrawnIndex = me.hand.length - 1;
      renderAll();

      await wait(420);

      if(getCompletedTriples(me.hand) >= 1 || getBestCount(me.hand) >= 2){
        updateGirlText(rand(girls[girlIndex].drawHumanGood));
      } else {
        updateGirlText(rand(girls[girlIndex].drawHumanNormal));
      }

      statusMain.textContent = `${getTileName(tileId)} を引いた`;
      subInfo.textContent = "ツモするか、手札を1枚捨てよう";
      await wait(WAIT_LONG);
      hideGirl();

      waitingPlayerDiscard = true;
      pendingTsumo = isWinningHand(me.hand);
      pendingRon = false;
      setBusy(false);
      renderAll();
    }

    async function onPlayerDiscard(index){
      if(gameEnded || busy || !waitingPlayerDiscard || pendingRon || pendingTsumo) return;

      setBusy(true);
      waitingPlayerDiscard = false;

      const me = players[0];
      const removed = me.hand.splice(index, 1)[0];
      justDrawnIndex = -1;

      const girlIndex = getSupportGirlIndex();
      showGirl(girlIndex, "……");
      showBigTile(removed, `${getTileName(removed)}を捨てる`);
      await wait(WAIT_DISCARD_PREVIEW);
      hideGirl();

      discardPile.push({
        tileId: removed,
        owner: `${me.seat}　${me.name}`,
        playerId: me.id
      });

      statusMain.textContent = `${getTileName(removed)} を捨てた`;
      subInfo.textContent = "ロン判定中";
      addHistory(`${me.seat}　${me.name} が ${getTileName(removed)} を捨てた。`);
      renderAll();

      await wait(WAIT_RON_CHECK);

      const ronWinner = getRonCandidateAfterDiscard(me, removed);
      if(ronWinner){
        if(ronWinner.id === "you"){
          pendingRon = true;
          lastDiscardInfo = { discarder: me, tileId: removed };
          statusMain.textContent = "ロンできます";
          subInfo.textContent = "ロンするか、スルーして続行";
          setBusy(false);
          renderAll();
          return;
        }
        await playRoundEndByRon(ronWinner, me, removed);
        setBusy(false);
        return;
      }

      turnIndex = (turnIndex + 1) % players.length;
      setBusy(false);
      await wait(280);
      await introTurn();
    }

    async function cpuTurn(player, girlIndex){
      if(gameEnded) return;

      setBusy(true);

      if(deck.length <= 0){
        hideGirl();
        await endRoundByJudgement();
        setBusy(false);
        return;
      }

      drawTile(player);
      renderAll();

      await wait(420);

      if(isWinningHand(player.hand)){
        hideGirl();
        statusMain.textContent = `${player.name} が3枚×2セット完成`;
        subInfo.textContent = "ツモ";
        renderAll();
        await playRoundEndByTsumo(player);
        setBusy(false);
        return;
      }

      if(getCompletedTriples(player.hand) >= 1 || getBestCount(player.hand) >= 2){
        updateGirlText(rand(girls[girlIndex].drawCpuGood));
      } else {
        updateGirlText(rand(girls[girlIndex].drawCpuNormal));
      }
      statusMain.textContent = `${player.name} が1枚引いた`;
      subInfo.textContent = "相手が様子を見ている";
      await wait(WAIT_LONG);

      updateGirlText("……");
      await wait(520);

      updateGirlText(rand(girls[girlIndex].thinkCpu));
      statusMain.textContent = `${player.name} が考えている`;
      subInfo.textContent = "どの牌を切るか悩み中";
      await wait(980);

      updateGirlText(rand(girls[girlIndex].discard));
      await wait(700);

      const discardIndex = cpuChooseDiscardIndex(player);
      const removed = player.hand.splice(discardIndex, 1)[0];

      updateGirlText("……");
      showBigTile(removed, `${getTileName(removed)}を捨てる`);
      await wait(WAIT_DISCARD_PREVIEW);
      hideGirl();

      discardPile.push({
        tileId: removed,
        owner: `${player.seat}　${player.name}`,
        playerId: player.id
      });

      statusMain.textContent = `${player.name} が ${getTileName(removed)} を捨てた`;
      subInfo.textContent = "ロン判定中";
      addHistory(`${player.seat}　${player.name} が ${getTileName(removed)} を捨てた。`);
      renderAll();

      await wait(WAIT_RON_CHECK);

      const ronWinner = getRonCandidateAfterDiscard(player, removed);
      if(ronWinner){
        if(ronWinner.id === "you"){
          pendingRon = true;
          waitingPlayerDiscard = false;
          lastDiscardInfo = { discarder: player, tileId: removed };
          statusMain.textContent = "ロンできます";
          subInfo.textContent = "ロンするか、スルーして続行";
          setBusy(false);
          renderAll();
          return;
        }
        await playRoundEndByRon(ronWinner, player, removed);
        setBusy(false);
        return;
      }

      turnIndex = (turnIndex + 1) % players.length;
      setBusy(false);
      await wait(280);
      await introTurn();
    }

    async function endRoundByJudgement(){
      const result = judgeRoundRanking();

      statusMain.textContent = "山札終了";
      subInfo.textContent = "3枚組数で判定";
      renderAll();

      await wait(600);

      if(result.reason === "draw"){
        await playRoundDraw();
      } else {
        await playRoundBestWin(result.winner);
      }
    }

    async function handleTsumoButton(){
      if(!pendingTsumo || busy) return;
      setBusy(true);
      const me = players[0];
      await playRoundEndByTsumo(me);
      setBusy(false);
    }

    async function handleRonButton(){
      if(!pendingRon || busy || !lastDiscardInfo) return;
      setBusy(true);
      const me = players[0];
      await playRoundEndByRon(me, lastDiscardInfo.discarder, lastDiscardInfo.tileId);
      setBusy(false);
    }

    async function handlePassButton(){
      if((!pendingRon && !pendingTsumo) || busy) return;
      setBusy(true);

      if(pendingTsumo){
        clearPendingActions();
        waitingPlayerDiscard = true;
        statusMain.textContent = "ツモを見送り";
        subInfo.textContent = "手札を1枚選んで捨てる";
        setBusy(false);
        renderAll();
        return;
      }

      if(pendingRon){
        clearPendingActions();
        turnIndex = (turnIndex + 1) % players.length;
        setBusy(false);
        renderAll();
        await wait(280);
        await introTurn();
      }
    }

    async function resetGame(){
      hideGirl();
      hideResultScreen();
      roundOverlay.classList.remove("show");
      roundResultOverlay.classList.remove("show");
      pendingNextRoundAction = null;

      players.forEach(p => {
        p.point = START_POINT;
        p.hand = [];
      });

      assignSeats();

      deck = [];
      discardPile = [];
      gameEnded = false;
      busy = false;
      waitingPlayerDiscard = false;
      justDrawnIndex = -1;
      historyLogs = [];
      parentSeatIndex = 0;
      turnIndex = 0;
      clearPendingActions();

      statusMain.textContent = "ゲーム開始";
      subInfo.textContent = "東スタート / 親から開始 / 親が勝てば連荘";
      renderHistory();
      renderAll();
      addHistory("ゲーム開始。全員5点スタート。");
      addHistory(`席順：${sortBySeat(players).map(p => `${p.seat} ${p.name}`).join(" / ")}`);

      await wait(450);
      await startRound();
    }

    async function startFromTitle(){
      titleOverlay.classList.remove("show");
      await wait(260);
      await resetGame();
    }

    tsumoBtn.addEventListener("click", handleTsumoButton);
    ronBtn.addEventListener("click", handleRonButton);
    passBtn.addEventListener("click", handlePassButton);

    nextRoundBtn.addEventListener("click", () => {
      if(!pendingNextRoundAction) return;
      roundResultOverlay.classList.remove("show");
      const fn = pendingNextRoundAction;
      pendingNextRoundAction = null;
      fn();
    });

    resetBtn.addEventListener("click", () => {
      if(busy) return;
      resetGame();
    });

    retryBtn.addEventListener("click", () => {
      resetGame();
    });

    startBtn.addEventListener("click", () => {
      startFromTitle();
    });

    renderHistory();
    assignSeats();
    renderAll();
  </script>
</body>
</html>
