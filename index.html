<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover" />
<title>チー娘ドンジャラ</title>
<style>
  *{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
  }
  html,body{
    margin:0;
    padding:0;
    width:100%;
    min-height:100%;
    background:#05070c;
    color:#fff;
    font-family:sans-serif;
  }
  body{
    display:flex;
    justify-content:center;
  }
  .app{
    width:100%;
    max-width:430px;
    min-height:100vh;
    background:
      radial-gradient(circle at top, rgba(255,255,255,.06), transparent 30%),
      linear-gradient(180deg,#10131d 0%,#06080d 100%);
    padding:12px 10px 18px;
  }
  .title{
    text-align:center;
    font-size:24px;
    font-weight:900;
    letter-spacing:.08em;
    margin:4px 0 12px;
  }
  .panel{
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.07);
    border-radius:22px;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
  }
  .statusBox{
    padding:14px 14px 10px;
    margin-bottom:12px;
  }
  .statusTop{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
    font-size:14px;
    font-weight:800;
    margin-bottom:10px;
  }
  .statusMain{
    text-align:center;
    font-size:16px;
    font-weight:900;
    min-height:24px;
    margin-bottom:8px;
  }
  .subInfo{
    text-align:center;
    font-size:12px;
    opacity:.75;
    min-height:18px;
  }

  .scoreWrap{
    padding:12px;
    margin-bottom:12px;
  }
  .scoreTitle{
    font-size:14px;
    font-weight:900;
    margin-bottom:10px;
  }
  .scoreList{
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .scoreLine{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 12px;
    background:rgba(255,255,255,.05);
    border-radius:14px;
    font-size:14px;
    font-weight:900;
  }
  .scoreLine.active{
    outline:2px solid rgba(255,255,255,.12);
  }
  .scoreName{
    display:flex;
    align-items:center;
    gap:8px;
  }
  .scoreBadge{
    min-width:22px;
    height:22px;
    border-radius:999px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
    font-weight:900;
    color:#111;
  }
  .badge-you{ background:#fff; }
  .badge-a{ background:#ffbfdc; }
  .badge-b{ background:#bedcff; }
  .badge-c{ background:#d6ffb8; }

  .centerWrap{
    padding:12px;
    margin-bottom:12px;
  }
  .centerGrid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
  }
  .stackBox{
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.06);
    border-radius:18px;
    padding:12px;
    min-height:112px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
  }
  .stackTitle{
    font-size:12px;
    opacity:.8;
    margin-bottom:8px;
    font-weight:800;
  }
  .stackCount{
    font-size:34px;
    font-weight:900;
    line-height:1;
  }
  .lastDiscardBox{
    width:92px;
    height:92px;
    border-radius:16px;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#1b2130;
    border:1px solid rgba(255,255,255,.08);
  }
  .lastOwner{
    margin-top:8px;
    font-size:12px;
    opacity:.8;
    min-height:18px;
    text-align:center;
  }

  .cpuWrap{
    padding:12px;
    margin-bottom:12px;
  }
  .cpuTitle{
    font-size:14px;
    font-weight:900;
    margin-bottom:10px;
  }
  .cpuGrid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:8px;
  }
  .cpuBox{
    background:rgba(255,255,255,.05);
    border-radius:16px;
    padding:10px 8px;
    text-align:center;
    border:1px solid rgba(255,255,255,.06);
  }
  .cpuBox.active{
    outline:2px solid rgba(255,255,255,.12);
  }
  .cpuName{
    font-size:13px;
    font-weight:900;
    margin-bottom:6px;
  }
  .cpuMeta{
    font-size:12px;
    opacity:.8;
    line-height:1.6;
  }

  .handWrap{
    padding:12px;
    margin-bottom:12px;
  }
  .handTitle{
    font-size:14px;
    font-weight:900;
    margin-bottom:10px;
  }
  .hand{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }
  .tileBtn{
    width:86px;
    height:86px;
    border:none;
    border-radius:18px;
    overflow:hidden;
    background:#1c2230;
    border:1px solid rgba(255,255,255,.08);
    color:#fff;
    font-size:12px;
    font-weight:900;
    padding:0;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    position:relative;
  }
  .tileBtn.drawn{
    outline:2px solid rgba(255,230,120,.95);
    transform:translateY(-1px);
  }
  .tileBtn:disabled{
    opacity:.55;
  }
  .tileImg{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }
  .tileFallback{
    padding:6px;
    line-height:1.25;
  }

  .controls{
    display:flex;
    gap:8px;
    margin-bottom:12px;
  }
  .mainBtn{
    appearance:none;
    border:none;
    border-radius:20px;
    padding:15px 14px;
    font-size:16px;
    font-weight:900;
    cursor:pointer;
  }
  #resetBtn{
    width:100%;
    background:#272b3b;
    color:#fff;
    border:1px solid rgba(255,255,255,.08);
  }

  .historyWrap{
    padding:12px;
  }
  .historyTitle{
    font-size:14px;
    font-weight:900;
    margin-bottom:10px;
  }
  .historyBox{
    max-height:220px;
    overflow:auto;
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .historyLine{
    background:rgba(255,255,255,.05);
    border-radius:12px;
    padding:10px 12px;
    font-size:13px;
    line-height:1.5;
  }

  .girlOverlay,
  .resultOverlay{
    position:fixed;
    inset:0;
    z-index:100;
    opacity:0;
    pointer-events:none;
    transition:opacity .26s ease;
  }
  .girlOverlay.show,
  .resultOverlay.show{
    opacity:1;
    pointer-events:auto;
  }
  .girlOverlay{
    background:#000;
  }
  .girlBg{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:center center;
    filter:brightness(.96);
  }
  .girlShade{
    position:absolute;
    inset:0;
    background:linear-gradient(180deg, rgba(0,0,0,.18) 0%, rgba(0,0,0,.02) 28%, rgba(0,0,0,.20) 100%);
  }
  .girlUi{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    justify-content:flex-end;
    padding:20px 16px max(20px, env(safe-area-inset-bottom));
  }
  .girlSpeech{
    width:100%;
    background:rgba(255,255,255,.10);
    backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px);
    color:#fff;
    border-radius:28px;
    padding:16px 16px 18px;
    border:1px solid rgba(255,255,255,.12);
    box-shadow:0 8px 24px rgba(0,0,0,.08);
  }
  .girlName{
    display:inline-block;
    margin-bottom:12px;
    padding:8px 15px;
    border-radius:999px;
    background:rgba(0,0,0,.72);
    color:#fff;
    font-size:14px;
    font-weight:900;
  }
  .girlText{
    font-size:18px;
    font-weight:900;
    line-height:1.55;
    min-height:42px;
    text-shadow:0 1px 2px rgba(0,0,0,.28);
  }

  .resultOverlay{
    z-index:120;
    background:rgba(5,7,12,.92);
  }
  .resultBox{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    width:min(92vw,430px);
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.12);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    border-radius:28px;
    padding:22px 18px 18px;
    box-shadow:0 14px 36px rgba(0,0,0,.22);
  }
  .resultTitle{
    font-size:28px;
    font-weight:900;
    text-align:center;
    margin-bottom:10px;
  }
  .resultSub{
    text-align:center;
    font-size:15px;
    opacity:.92;
    margin-bottom:16px;
    line-height:1.6;
  }
  .resultList{
    background:rgba(255,255,255,.05);
    border-radius:18px;
    padding:10px;
    margin-bottom:14px;
  }
  .resultLine{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 10px;
    border-radius:12px;
    background:rgba(255,255,255,.04);
    margin-bottom:6px;
    font-size:14px;
    font-weight:800;
  }
  .resultLine:last-child{ margin-bottom:0; }
  .resultButtons{
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .resultBtn{
    appearance:none;
    border:none;
    border-radius:18px;
    padding:16px 14px;
    font-size:16px;
    font-weight:900;
    cursor:pointer;
  }
  .resultRetry{
    background:#fff;
    color:#111;
  }

  @media (max-width:390px){
    .tileBtn{
      width:78px;
      height:78px;
    }
  }
</style>
</head>
<body>
  <div class="app">
    <div class="title">チー娘ドンジャラ</div>

    <div class="panel statusBox">
      <div class="statusTop">
        <span id="turnLabel">現在の番：あなた</span>
        <span id="roundLabel">東局</span>
      </div>
      <div class="statusMain" id="statusMain">ゲーム開始</div>
      <div class="subInfo" id="subInfo">通常手札5枚 / 3枚×2セットで上がり</div>
    </div>

    <div class="panel scoreWrap">
      <div class="scoreTitle">点数</div>
      <div class="scoreList" id="scoreList"></div>
    </div>

    <div class="panel centerWrap">
      <div class="centerGrid">
        <div class="stackBox">
          <div class="stackTitle">山札</div>
          <div class="stackCount" id="deckCount">0</div>
        </div>
        <div class="stackBox">
          <div class="stackTitle">最後に捨てた牌</div>
          <div class="lastDiscardBox" id="lastDiscardBox">-</div>
          <div class="lastOwner" id="lastOwner">---</div>
        </div>
      </div>
    </div>

    <div class="panel cpuWrap">
      <div class="cpuTitle">相手</div>
      <div class="cpuGrid" id="cpuGrid"></div>
    </div>

    <div class="panel handWrap">
      <div class="handTitle">あなたの手札</div>
      <div class="hand" id="hand"></div>
    </div>

    <div class="controls">
      <button class="mainBtn" id="resetBtn" type="button">リセット</button>
    </div>

    <div class="panel historyWrap">
      <div class="historyTitle">履歴</div>
      <div class="historyBox" id="historyBox"></div>
    </div>
  </div>

  <div class="girlOverlay" id="girlOverlay">
    <img src="girl1.png" alt="チー娘" class="girlBg" id="girlBg">
    <div class="girlShade"></div>
    <div class="girlUi">
      <div class="girlSpeech">
        <div class="girlName" id="girlName">チー娘A</div>
        <div class="girlText" id="girlText">いくよ。</div>
      </div>
    </div>
  </div>

  <div class="resultOverlay" id="resultOverlay">
    <div class="resultBox">
      <div class="resultTitle" id="resultTitle">あなたの勝ち！</div>
      <div class="resultSub" id="resultSub">トップで終了しました。</div>
      <div class="resultList" id="resultList"></div>
      <div class="resultButtons">
        <button class="resultBtn resultRetry" id="retryBtn" type="button">もう一回</button>
      </div>
    </div>
  </div>

<script>

  const BASE_HAND_SIZE = 5;
  const COPIES_PER_TILE = 6;
  const WAIT_SHORT = 380;
  const WAIT_MID = 700;
  const WAIT_LONG = 1150;

      tsumo:["ツモだよ！","自分で引いた！","ギュウ！！","やった！"],

      drawRound:["流局だね。","今回は誰もそろわなかった。","引き分けだよ。","次の局いこ。"],

      finalWinCpu:["やった、私が勝ち。","先に決めたよ。","勝っちゃった。","これで1位だね。"]
    },
    {
      name:"チー娘B",
      image:"girl2.png",
      introHuman:["ほら、あなたの番。","どれ切るの？","ちゃんと見て選んで。","さて、どうするの。"],
      drawHumanGood:["悪くないじゃん。","来たかもね。","それ残す？","かなりいい形。"],
      drawHumanNormal:["まあ普通。","まだ何とも。","急がなくていいでしょ。","考えるところね。"],
      introCpu:["始めるよ。","見てなさい。","引く。","私の番ね。"],
      drawCpuGood:["来るね。","悪くない。","揃うんじゃない？","だいぶ近い。"],
      drawCpuNormal:["普通。","まだかな。","まあいい。","そんなものね。"],
      discard:["これで。","切るよ。","はい次。","これを捨てる。"],
      tsumo:["ツモ。","自分で引いたわ。","これで上がり。","決まりね。"],
      ron:["それロン。","通ったと思った？","その牌で完成。","待ってたわ。"],
      drawRound:["流局ね。","誰も上がれなかったか。","今局はなし。","次で決める。"],
      hako:["飛んだね。","ここで終了。","もう持たないか。","決着ね。"],

    {

      drawHumanGood:["揃うかもね。","来たっぽい。","まあ良さそう。","悪くない。"],
      drawHumanNormal:["どうだろ。","まだ分からない。","……普通。","別に。"],
      introCpu:["……いく。","引く。","始める。","私の番。"],
      drawCpuGood:["来た。","揃うかも。","悪くない。","たぶんこれ。"],
      drawCpuNormal:["……まだ。","ふつう。","別に。","そんな感じ。"],
      discard:["これで。","切る。","……次。","いらない。"],
      tsumo:["ツモ。","引いた。","上がり。","……勝ち。"],
      ron:["それロン。","その牌でいい。","待ってた。","完成。"],
      drawRound:["流局。","誰も上がらない。","……終わり。","次。"],
      hako:["飛んだ。","ここで終わり。","ハコテン。","……決まり。"],
      finalWinYou:["あなたが優勝。","……おめでとう。","トップだね。","終わり。あなたの勝ち。"],
      finalWinCpu:["私が優勝。","……終わり。","勝った。","これで終わり。"]
    }
  ];

  let deck = [];
  let turnIndex = 0;
  let roundIndex = 0;
  let gameEnded = false;
  let busy = false;
  let waitingPlayerDiscard = false;
  let justDrawnIndex = -1;
  let lastDiscard = null;
  let lastDiscardOwner = "---";
  let historyLogs = [];

  const turnLabel = document.getElementById("turnLabel");
  const roundLabel = document.getElementById("roundLabel");
  const statusMain = document.getElementById("statusMain");
  const subInfo = document.getElementById("subInfo");
  const scoreList = document.getElementById("scoreList");
  const deckCount = document.getElementById("deckCount");
  const lastDiscardBox = document.getElementById("lastDiscardBox");
  const lastOwner = document.getElementById("lastOwner");
  const cpuGrid = document.getElementById("cpuGrid");
  const handEl = document.getElementById("hand");
  const historyBox = document.getElementById("historyBox");
  const resetBtn = document.getElementById("resetBtn");
  const retryBtn = document.getElementById("retryBtn");

  const girlOverlay = document.getElementById("girlOverlay");
  const girlBg = document.getElementById("girlBg");
  const girlNameEl = document.getElementById("girlName");
  const girlTextEl = document.getElementById("girlText");

  const resultOverlay = document.getElementById("resultOverlay");
  const resultTitle = document.getElementById("resultTitle");
  const resultSub = document.getElementById("resultSub");
  const resultList = document.getElementById("resultList");

  function rand(arr){
    return arr[Math.floor(Math.random() * arr.length)];
  }

  function wait(ms){
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  function shuffle(array){
    const arr = [...array];
    for(let i = arr.length - 1; i > 0; i--){
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function setBusy(flag){
    busy = flag;
    resetBtn.disabled = flag;
  }

  function addHistory(text){
    historyLogs.unshift(text);
    renderHistory();
  }

  function renderHistory(){
    historyBox.innerHTML = "";
    if(!historyLogs.length){
      const div = document.createElement("div");
      div.className = "historyLine";
      div.textContent = "まだ履歴はありません。";
      historyBox.appendChild(div);
      return;
    }
    historyLogs.forEach(line => {
      const div = document.createElement("div");
      div.className = "historyLine";
      div.textContent = line;
      historyBox.appendChild(div);
    });
  }

  function getCurrentPlayer(){
    return players[turnIndex];
  }

  function getSupportGirlIndex(){
    return Math.floor(Math.random() * 3);
  }

  function getTileById(id){
    return TILES.find(t => t.id === id);
  }

  function getTileName(id){
    const tile = getTileById(id);
    return tile ? tile.name : id;
  }

  function createDeck(){
    const arr = [];
    TILES.forEach(tile => {
      for(let i = 0; i < COPIES_PER_TILE; i++){
        arr.push(tile.id);
      }
    });
    return shuffle(arr);
  }

  function countMap(hand){
    const map = {};
    hand.forEach(tileId => {
      map[tileId] = (map[tileId] || 0) + 1;
    });
    return map;
  }

  function getCompletedTriples(hand){
    const map = countMap(hand);
    let sets = 0;
    for(const key in map){
      sets += Math.floor(map[key] / 3);
    }
    return sets;
  }

  function isWinningHand(hand){
    return getCompletedTriples(hand) >= 2;
  }

  function getBestCount(hand){
    const map = countMap(hand);
    let best = 0;
    Object.values(map).forEach(v => {
      if(v > best) best = v;
    });
    return best;
  }

  function drawTile(player){
    if(deck.length <= 0) return null;
    const tileId = deck.pop();
    player.hand.push(tileId);
    return tileId;
  }

  function canRonWithTile(hand, tileId){
    const temp = [...hand, tileId];
    return isWinningHand(temp);
  }

  function showGirl(girlIndex, text){
    const g = girls[girlIndex];
    girlBg.src = g.image;
    girlNameEl.textContent = g.name;
    girlTextEl.textContent = text;
    girlOverlay.classList.add("show");
  }

  function hideGirl(){
    girlOverlay.classList.remove("show");
  }

  function renderTileContent(parent, tileId){
    const tile = getTileById(tileId);
    parent.innerHTML = "";

    if(!tile){
      const div = document.createElement("div");
      div.className = "tileFallback";
      div.textContent = tileId;
      parent.appendChild(div);
      return;
    }

    const img = document.createElement("img");
    img.className = "tileImg";
    img.src = tile.image;
    img.alt = tile.name;
    img.onerror = () => {
      parent.innerHTML = `<div class="tileFallback">${tile.name}</div>`;
    };
    parent.appendChild(img);
  }

  function renderLastDiscard(){
    lastDiscardBox.innerHTML = "";
    if(!lastDiscard){
      lastDiscardBox.textContent = "-";
      return;
    }
    const inner = document.createElement("div");
    inner.style.width = "100%";
    inner.style.height = "100%";
    renderTileContent(inner, lastDiscard);
    lastDiscardBox.appendChild(inner);
  }

  function renderScores(){
    scoreList.innerHTML = "";
    players.forEach(player => {
      const row = document.createElement("div");
      row.className = "scoreLine" + (getCurrentPlayer().id === player.id && !gameEnded ? " active" : "");

      let badgeClass = "badge-you";
      if(player.id === "a") badgeClass = "badge-a";
      if(player.id === "b") badgeClass = "badge-b";
      if(player.id === "c") badgeClass = "badge-c";

      row.innerHTML = `
        <div class="scoreName">
          <span class="scoreBadge ${badgeClass}">${player.short}</span>
          <span>${player.name}</span>
        </div>
        <div>${player.point}点</div>
      `;
      scoreList.appendChild(row);
    });
  }

  function renderCpuBoxes(){
    cpuGrid.innerHTML = "";
    players.filter(p => p.type === "cpu").forEach(cpu => {
      const div = document.createElement("div");
      div.className = "cpuBox" + (getCurrentPlayer().id === cpu.id && !gameEnded ? " active" : "");
      div.innerHTML = `
        <div class="cpuName">${cpu.name}</div>
        <div class="cpuMeta">
          手牌 ${cpu.hand.length}枚<br>
          3枚組 ${getCompletedTriples(cpu.hand)}
        </div>
      `;
      cpuGrid.appendChild(div);
    });
  }

  function renderHand(){
    const me = players[0];
    handEl.innerHTML = "";
    me.hand.forEach((tileId, index) => {
      const btn = document.createElement("button");
      btn.className = "tileBtn" + (index === justDrawnIndex ? " drawn" : "");
      btn.disabled = !(waitingPlayerDiscard && !busy && !gameEnded);
      btn.addEventListener("click", () => onPlayerDiscard(index));

      renderTileContent(btn, tileId);
      handEl.appendChild(btn);
    });
  }

  function renderAll(){
    turnLabel.textContent = `現在の番：${getCurrentPlayer().name}`;
    roundLabel.textContent = `${ROUNDS[roundIndex]}局`;
    deckCount.textContent = deck.length;
    lastOwner.textContent = lastDiscardOwner;
    renderLastDiscard();
    renderScores();
    renderCpuBoxes();
    renderHand();
  }

  function showResultScreen(winners){
    resultList.innerHTML = "";

    const sorted = [...players].sort((a,b) => b.point - a.point);
    sorted.forEach((p, i) => {
      const row = document.createElement("div");
      row.className = "resultLine";
      row.innerHTML = `<span>${i + 1}位　${p.name}</span><span>${p.point}点</span>`;
      resultList.appendChild(row);
    });

    if(winners.length === 1){
      resultTitle.textContent = `${winners[0].name}の優勝！`;
      resultSub.textContent = winners[0].id === "you"
        ? "トップで終了しました。"
        : "相手がトップで終了しました。";
    } else {
      resultTitle.textContent = "同点優勝！";
      resultSub.textContent = winners.map(w => w.name).join(" / ") + " が同点トップでした。";
    }

    resultOverlay.classList.add("show");
  }

  function hideResultScreen(){
    resultOverlay.classList.remove("show");
  }

  function cpuChooseDiscardIndex(player){
    const map = countMap(player.hand);
    let candidates = [];
    let minCount = Infinity;

    player.hand.forEach((tileId, i) => {
      const c = map[tileId];
      if(c < minCount){
        minCount = c;
        candidates = [i];
      } else if(c === minCount){
        candidates.push(i);
      }
    });

    return candidates[Math.floor(Math.random() * candidates.length)];
  }

  function applyTsumoPoints(winnerIndex){
    players.forEach((p, idx) => {
      if(idx === winnerIndex){
        p.point += 3;
      } else {
        p.point -= 1;
      }
    });
  }

  function applyRonPoints(winnerIndex, discarderIndex){
    players[winnerIndex].point += 2;
    players[discarderIndex].point -= 2;
  }

  function getFinalWinnersByPoints(){
    const max = Math.max(...players.map(p => p.point));
    return players.filter(p => p.point === max);
  }

  function hasHako(){
    return players.some(p => p.point <= 0);
  }

  function judgeRoundRanking(){
    const ranking = players.map(player => ({
      player,
      triples:getCompletedTriples(player.hand),
      best:getBestCount(player.hand)
    }));

    ranking.sort((a,b) => {
      if(b.triples !== a.triples) return b.triples - a.triples;
      return b.best - a.best;
    });

    const top = ranking[0];
    const sameTop = ranking.filter(r => r.triples === top.triples && r.best === top.best);

    if(sameTop.length >= 2){
      return { reason:"draw" };
    }

    return {
      reason:"best",
      winner:top.player
    };
  }

  async function playRoundEndByTsumo(winnerIndex){
    const winner = players[winnerIndex];
    const girlIndex = winner.type === "human" ? getSupportGirlIndex() : winner.girlIndex;
    const g = girls[girlIndex];

    showGirl(girlIndex, rand(g.tsumo));
    await wait(WAIT_LONG);
    hideGirl();

    applyTsumoPoints(winnerIndex);
    addHistory(`${ROUNDS[roundIndex]}局：${winner.name} がツモ。`);

    statusMain.textContent = `${winner.name} ツモ`;
    subInfo.textContent = `他3人から各1点`;
    renderAll();

    await wait(WAIT_SHORT);

    if(hasHako()){
      showGirl(girlIndex, rand(g.hako));
      await wait(WAIT_LONG);
      hideGirl();
      gameEnded = true;
      await showMatchFinal(getFinalWinnersByPoints());
      return;
    }

    await nextRoundOrFinish();
  }

  async function playRoundEndByRon(winnerIndex, discarderIndex, tileId){
    const winner = players[winnerIndex];
    const discarder = players[discarderIndex];
    const girlIndex = winner.type === "human" ? getSupportGirlIndex() : winner.girlIndex;
    const g = girls[girlIndex];

    showGirl(girlIndex, rand(g.ron));
    await wait(WAIT_LONG);
    hideGirl();

    applyRonPoints(winnerIndex, discarderIndex);
    addHistory(`${ROUNDS[roundIndex]}局：${winner.name} が ${discarder.name} の ${getTileName(tileId)} でロン。`);

    statusMain.textContent = `${winner.name} ロン`;
    subInfo.textContent = `${discarder.name} から2点`;
    renderAll();

    await wait(WAIT_SHORT);

    if(hasHako()){
      showGirl(girlIndex, rand(g.hako));
      await wait(WAIT_LONG);
      hideGirl();
      gameEnded = true;
      await showMatchFinal(getFinalWinnersByPoints());
      return;
    }

    await nextRoundOrFinish();
  }

  async function playRoundDraw(){
    const girlIndex = getSupportGirlIndex();
    const g = girls[girlIndex];

    showGirl(girlIndex, rand(g.drawRound));
    await wait(WAIT_LONG);
    hideGirl();

    addHistory(`${ROUNDS[roundIndex]}局：流局。点数変動なし。`);
    statusMain.textContent = "流局";
    subInfo.textContent = "点数変動なし";
    renderAll();

    await nextRoundOrFinish();
  }

  async function playRoundBestWin(winnerIndex){
    const winner = players[winnerIndex];
    const girlIndex = winner.type === "human" ? getSupportGirlIndex() : winner.girlIndex;
    const g = girls[girlIndex];

    showGirl(girlIndex, rand(g.tsumo));
    await wait(WAIT_LONG);
    hideGirl();

    players[winnerIndex].point += 1;
    addHistory(`${ROUNDS[roundIndex]}局：山札終了。${winner.name} が判定勝ち。`);

    statusMain.textContent = "山札終了";
    subInfo.textContent = `${winner.name} +1`;
    renderAll();

    await wait(WAIT_SHORT);

    if(hasHako()){
      showGirl(girlIndex, rand(g.hako));
      await wait(WAIT_LONG);
      hideGirl();
      gameEnded = true;
      await showMatchFinal(getFinalWinnersByPoints());
      return;
    }

    await nextRoundOrFinish();
  }

  async function showMatchFinal(winners){
    if(winners.length === 1){
      const winner = winners[0];
      const girlIndex = winner.id === "you" ? getSupportGirlIndex() : winner.girlIndex;
      const lines = winner.id === "you"
        ? girls[girlIndex].finalWinYou
        : girls[girlIndex].finalWinCpu;

      showGirl(girlIndex, rand(lines));
      await wait(1700);
      hideGirl();
    } else {
      const girlIndex = getSupportGirlIndex();
      showGirl(girlIndex, "同点優勝だね。");
      await wait(1700);
      hideGirl();
    }

    showResultScreen(winners);
  }

  async function nextRoundOrFinish(){
    roundIndex += 1;
    if(roundIndex >= ROUNDS.length){
      gameEnded = true;
      await showMatchFinal(getFinalWinnersByPoints());
      return;
    }
    await wait(500);
    await startRound();
  }

  function getRonCandidateAfterDiscard(discarderIndex, tileId){
    for(let offset = 1; offset < players.length; offset++){
      const idx = (discarderIndex + offset) % players.length;
      if(canRonWithTile(players[idx].hand, tileId)){
        return idx;
      }
    }
    return -1;
  }

  async function startRound(){
    if(gameEnded) return;

    deck = createDeck();
    players.forEach(p => p.hand = []);
    lastDiscard = null;
    lastDiscardOwner = "---";
    justDrawnIndex = -1;
    waitingPlayerDiscard = false;

    for(let i = 0; i < BASE_HAND_SIZE; i++){
      players.forEach(p => drawTile(p));
    }

    statusMain.textContent = `${ROUNDS[roundIndex]}局開始`;
    subInfo.textContent = "通常手札5枚";
    renderAll();
    addHistory(`${ROUNDS[roundIndex]}局開始。`);

    await wait(500);
    turnIndex = 0;
    await introTurn();
  }

  async function introTurn(){
    if(gameEnded) return;
    const player = getCurrentPlayer();
    renderAll();

    if(player.type === "human"){
      const girlIndex = getSupportGirlIndex();
      showGirl(girlIndex, rand(girls[girlIndex].introHuman));
      statusMain.textContent = "あなたの番";
      subInfo.textContent = "1枚引いて6枚→1枚捨てる";
      await wait(WAIT_LONG);
      hideGirl();
      await wait(220);
      await playerDrawPhase(girlIndex);
    } else {
      const girlIndex = player.girlIndex;
      showGirl(girlIndex, rand(girls[girlIndex].introCpu));
      statusMain.textContent = `${player.name}の番`;
      subInfo.textContent = "相手が考え中";
      await wait(WAIT_LONG);
      hideGirl();
      await wait(220);
      await cpuTurn(turnIndex);
    }
  }

  async function playerDrawPhase(girlIndex){
    if(gameEnded) return;

    setBusy(true);

    if(deck.length <= 0){
      await endRoundByJudgement();
      setBusy(false);
      return;
    }

    const me = players[0];
    const tileId = drawTile(me);
    justDrawnIndex = me.hand.length - 1;
    renderAll();

    if(isWinningHand(me.hand)){
      statusMain.textContent = `3枚×2セット完成`;
      subInfo.textContent = "ツモ";
      renderAll();
      await playRoundEndByTsumo(0);
      setBusy(false);
      return;
    }

    if(getCompletedTriples(me.hand) >= 1 || getBestCount(me.hand) >= 2){
      showGirl(girlIndex, rand(girls[girlIndex].drawHumanGood));
    } else {
      showGirl(girlIndex, rand(girls[girlIndex].drawHumanNormal));
    }
    statusMain.textContent = `${getTileName(tileId)} を引いた`;
    subInfo.textContent = "1枚タップして捨ててね";
    await wait(900);
    hideGirl();

    waitingPlayerDiscard = true;
    setBusy(false);
    renderAll();
  }

  async function onPlayerDiscard(index){
    if(gameEnded || busy || !waitingPlayerDiscard) return;

    setBusy(true);
    waitingPlayerDiscard = false;

    const me = players[0];
    const removed = me.hand.splice(index, 1)[0];
    lastDiscard = removed;
    lastDiscardOwner = me.name;
    justDrawnIndex = -1;

    statusMain.textContent = `${getTileName(removed)} を捨てた`;
    subInfo.textContent = "ロン判定中";
    addHistory(`あなた が ${getTileName(removed)} を捨てた。`);
    renderAll();

    await wait(WAIT_SHORT);

    const ronWinner = getRonCandidateAfterDiscard(0, removed);
    if(ronWinner >= 0){
      await playRoundEndByRon(ronWinner, 0, removed);
      setBusy(false);
      return;
    }

    turnIndex = (turnIndex + 1) % players.length;
    setBusy(false);
    await introTurn();
  }

  async function cpuTurn(playerIndex){
    if(gameEnded) return;

    setBusy(true);

    if(deck.length <= 0){
      await endRoundByJudgement();
      setBusy(false);
      return;
    }

    const player = players[playerIndex];
    const girlIndex = player.girlIndex;
    const tileId = drawTile(player);
    renderAll();

    if(isWinningHand(player.hand)){
      statusMain.textContent = `${player.name} が3枚×2セット完成`;
      subInfo.textContent = "ツモ";
      renderAll();
      await playRoundEndByTsumo(playerIndex);
      setBusy(false);
      return;
    }

    if(getCompletedTriples(player.hand) >= 1 || getBestCount(player.hand) >= 2){
      showGirl(girlIndex, rand(girls[girlIndex].drawCpuGood));
    } else {
      showGirl(girlIndex, rand(girls[girlIndex].drawCpuNormal));
    }
    statusMain.textContent = `${player.name} が1枚引いた`;
    subInfo.textContent = "相手が牌を選んでいる";
    await wait(900);
    hideGirl();

    showGirl(girlIndex, rand(girls[girlIndex].discard));
    await wait(700);
    hideGirl();

    const discardIndex = cpuChooseDiscardIndex(player);
    const removed = player.hand.splice(discardIndex, 1)[0];
    lastDiscard = removed;
    lastDiscardOwner = player.name;

    statusMain.textContent = `${player.name} が ${getTileName(removed)} を捨てた`;
    subInfo.textContent = "ロン判定中";
    addHistory(`${player.name} が ${getTileName(removed)} を捨てた。`);
    renderAll();

    await wait(WAIT_SHORT);

    const ronWinner = getRonCandidateAfterDiscard(playerIndex, removed);
    if(ronWinner >= 0){
      await playRoundEndByRon(ronWinner, playerIndex, removed);
      setBusy(false);
      return;
    }

    turnIndex = (turnIndex + 1) % players.length;
    setBusy(false);
    await introTurn();
  }

  async function endRoundByJudgement(){
    const result = judgeRoundRanking();

    statusMain.textContent = "山札終了";
    subInfo.textContent = "3枚組数で判定";
    renderAll();

    if(result.reason === "draw"){
      await playRoundDraw();
    } else {
      const winnerIndex = players.findIndex(p => p.id === result.winner.id);
      await playRoundBestWin(winnerIndex);
    }
  }

  async function resetGame(){
    hideGirl();
    hideResultScreen();

    players.forEach(p => {
      p.point = START_POINT;
      p.hand = [];
    });

    deck = [];
    turnIndex = 0;
    roundIndex = 0;
    gameEnded = false;
    busy = false;
    waitingPlayerDiscard = false;
    justDrawnIndex = -1;
    lastDiscard = null;
    lastDiscardOwner = "---";
    historyLogs = [];

    statusMain.textContent = "ゲーム開始";
    subInfo.textContent = "東南西北の半チャン";
    renderHistory();
    renderAll();
    addHistory("ゲーム開始。全員5点スタート。");

    await wait(350);
    await startRound();
  }

  resetBtn.addEventListener("click", () => {
    if(busy) return;
    resetGame();
  });

  retryBtn.addEventListener("click", () => {
    resetGame();
  });

  resetGame();
</script>
