<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>デカブサドンジャラ試作</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{
    margin:0;
    background:#111;
    color:#fff;
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
  }
  .app{
    max-width:560px;
    margin:0 auto;
    min-height:100svh;
    display:flex;
    flex-direction:column;
    padding:12px;
    gap:12px;
  }
  .panel{
    background:#1b1b1b;
    border:1px solid rgba(255,255,255,.12);
    border-radius:16px;
    padding:12px;
  }
  .title{
    font-size:20px;
    font-weight:800;
    text-align:center;
    margin:4px 0 2px;
  }
  .sub{
    text-align:center;
    font-size:12px;
    opacity:.75;
  }
  .status{
    min-height:48px;
    line-height:1.6;
    font-size:14px;
    white-space:pre-line;
  }
  .row-title{
    font-size:13px;
    font-weight:700;
    opacity:.9;
    margin-bottom:8px;
  }
  .hand{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
  }
  .tile{
    min-width:84px;
    height:64px;
    border:none;
    border-radius:14px;
    color:#fff;
    font-weight:800;
    font-size:14px;
    padding:8px;
    background:#333;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.1);
  }
  .tile.player{
    background:#4b5563;
  }
  .tile.cpu{
    background:#2a2a2a;
  }
  .tile.drawn{
    outline:2px solid #ffd54f;
  }
  .tile:disabled{
    opacity:.55;
  }
  .center{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
  }
  .stackBox{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:8px;
    min-height:120px;
  }
  .stack{
    width:92px;
    height:64px;
    border-radius:14px;
    background:linear-gradient(135deg,#444,#222);
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:800;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.1);
  }
  .last{
    width:100%;
    min-height:64px;
    border-radius:14px;
    background:#262626;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:10px;
    font-weight:700;
  }
  .controls{
    display:flex;
    gap:8px;
  }
  .btn{
    flex:1;
    height:48px;
    border:none;
    border-radius:14px;
    font-size:15px;
    font-weight:800;
    color:#fff;
    background:#2563eb;
  }
  .btn.subbtn{
    background:#374151;
  }
  .btn:disabled{
    opacity:.45;
  }
  .result{
    font-size:18px;
    font-weight:900;
    text-align:center;
    padding:12px 8px 0;
  }
  .small{
    font-size:12px;
    opacity:.7;
    text-align:center;
  }
</style>
</head>
<body>
<div class="app">
  <div class="panel">
    <div class="title">デカブサドンジャラ試作</div>
    <div class="sub">同じ牌を3枚そろえて2セットで勝ち</div>
  </div>

  <div class="panel">
    <div class="status" id="status">開始ボタンを押してね</div>
    <div class="result" id="result"></div>
    <div class="small" id="smallInfo"></div>
  </div>

  <div class="panel">
    <div class="row-title">CPUの手札</div>
    <div class="hand" id="cpuHand"></div>
  </div>

  <div class="panel center">
    <div class="stackBox">
      <div class="row-title">山札</div>
      <div class="stack" id="deckCount">0枚</div>
    </div>
    <div class="stackBox">
      <div class="row-title">最後に捨てた牌</div>
      <div class="last" id="lastDiscard">---</div>
    </div>
  </div>

  <div class="panel">
    <div class="row-title">あなたの手札</div>
    <div class="hand" id="playerHand"></div>
  </div>

  <div class="controls">
    <button class="btn" id="startBtn">開始</button>
    <button class="btn subbtn" id="restartBtn">やり直し</button>
  </div>
</div>

<script>
(() => {
  const TILE_NAMES = [
    "デカブサ",
    "デカブサ兄",
    "ナマケン",
    "カバオ",
    "ペンペン",
    "クオちゃん"
  ];

  const COPIES_PER_TILE = 6; // 各6枚 -> 合計36枚
  const HAND_SIZE = 5;

  let deck = [];
  let playerHand = [];
  let cpuHand = [];
  let lastDiscard = "---";
  let gameOver = false;
  let waitingPlayerDiscard = false;
  let justDrawnIndex = -1;

  const elStatus = document.getElementById("status");
  const elResult = document.getElementById("result");
  const elSmall = document.getElementById("smallInfo");
  const elCpuHand = document.getElementById("cpuHand");
  const elPlayerHand = document.getElementById("playerHand");
  const elDeckCount = document.getElementById("deckCount");
  const elLastDiscard = document.getElementById("lastDiscard");
  const elStartBtn = document.getElementById("startBtn");
  const elRestartBtn = document.getElementById("restartBtn");

  function shuffle(arr){
    for(let i = arr.length - 1; i > 0; i--){
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function createDeck(){
    const arr = [];
    for(const name of TILE_NAMES){
      for(let i = 0; i < COPIES_PER_TILE; i++){
        arr.push(name);
      }
    }
    return shuffle(arr);
  }

  function drawTile(hand){
    if(deck.length <= 0) return null;
    const tile = deck.pop();
    hand.push(tile);
    return tile;
  }

  function countMap(hand){
    const map = {};
    for(const t of hand){
      map[t] = (map[t] || 0) + 1;
    }
    return map;
  }

  function getCompletedSets(hand){
    const map = countMap(hand);
    let sets = 0;
    for(const k in map){
      sets += Math.floor(map[k] / 3);
    }
    return sets;
  }

  function isWin(hand){
    return getCompletedSets(hand) >= 2;
  }

  function render(){
    elDeckCount.textContent = `${deck.length}枚`;
    elLastDiscard.textContent = lastDiscard;

    elCpuHand.innerHTML = "";
    cpuHand.forEach(() => {
      const d = document.createElement("div");
      d.className = "tile cpu";
      d.textContent = "？？？";
      elCpuHand.appendChild(d);
    });

    elPlayerHand.innerHTML = "";
    playerHand.forEach((tile, i) => {
      const btn = document.createElement("button");
      btn.className = "tile player" + (i === justDrawnIndex ? " drawn" : "");
      btn.textContent = tile;
      btn.disabled = gameOver || !waitingPlayerDiscard;
      btn.onclick = () => playerDiscard(i);
      elPlayerHand.appendChild(btn);
    });

    const playerSets = getCompletedSets(playerHand);
    const cpuSets = getCompletedSets(cpuHand);
    elSmall.textContent = `あなた: ${playerSets}セット / CPU: ${cpuSets}セット`;
  }

  function setStatus(text){
    elStatus.textContent = text;
  }

  function finishGame(winner, message){
    gameOver = true;
    waitingPlayerDiscard = false;
    justDrawnIndex = -1;
    elResult.textContent = winner;
    setStatus(message);
    render();
  }

  function startGame(){
    deck = createDeck();
    playerHand = [];
    cpuHand = [];
    lastDiscard = "---";
    gameOver = false;
    waitingPlayerDiscard = false;
    justDrawnIndex = -1;
    elResult.textContent = "";

    for(let i = 0; i < HAND_SIZE; i++){
      drawTile(playerHand);
      drawTile(cpuHand);
    }

    render();

    if(isWin(playerHand)){
      finishGame("あなたの勝ち", "配牌でそろった。ギュウ");
      return;
    }
    if(isWin(cpuHand)){
      finishGame("CPUの勝ち", "CPUが最初からそろえていた……");
      return;
    }

    playerTurnStart();
  }

  function playerTurnStart(){
    if(gameOver) return;

    if(deck.length <= 0){
      judgeBySets("山札がなくなったので終了");
      return;
    }

    const tile = drawTile(playerHand);
    justDrawnIndex = playerHand.length - 1;
    render();

    if(isWin(playerHand)){
      finishGame("あなたの勝ち", `「${tile}」を引いて完成。ギュウ`);
      return;
    }

    waitingPlayerDiscard = true;
    setStatus(`あなたの番\n「${tile}」を引いた。1枚タップして捨ててね`);
    render();
  }

  function playerDiscard(index){
    if(gameOver || !waitingPlayerDiscard) return;

    const removed = playerHand.splice(index, 1)[0];
    lastDiscard = removed;
    waitingPlayerDiscard = false;
    justDrawnIndex = -1;
    setStatus(`あなたは「${removed}」を捨てた`);
    render();

    setTimeout(cpuTurnStart, 450);
  }

  function cpuChooseDiscardIndex(){
    const map = countMap(cpuHand);

    // そろいにくい単独牌を優先して捨てる
    let candidateIndexes = [];
    let minCount = Infinity;

    cpuHand.forEach((tile, i) => {
      const c = map[tile];
      if(c < minCount){
        minCount = c;
        candidateIndexes = [i];
      }else if(c === minCount){
        candidateIndexes.push(i);
      }
    });

    return candidateIndexes[Math.floor(Math.random() * candidateIndexes.length)];
  }

  function cpuTurnStart(){
    if(gameOver) return;

    if(deck.length <= 0){
      judgeBySets("山札がなくなったので終了");
      return;
    }

    const tile = drawTile(cpuHand);

    if(isWin(cpuHand)){
      render();
      finishGame("CPUの勝ち", `CPUが「${tile}」を引いて完成……`);
      return;
    }

    const discardIndex = cpuChooseDiscardIndex();
    const removed = cpuHand.splice(discardIndex, 1)[0];
    lastDiscard = removed;

    setStatus(`CPUの番\nCPUは1枚引いて「${removed}」を捨てた`);
    render();

    setTimeout(() => {
      if(deck.length <= 0){
        judgeBySets("山札がなくなったので終了");
        return;
      }
      playerTurnStart();
    }, 450);
  }

  function judgeBySets(prefix){
    const p = getCompletedSets(playerHand);
    const c = getCompletedSets(cpuHand);

    if(p > c){
      finishGame("あなたの勝ち", `${prefix}\nセット数判定であなたの勝ち。ギュウ`);
    }else if(c > p){
      finishGame("CPUの勝ち", `${prefix}\nセット数判定でCPUの勝ち……`);
    }else{
      finishGame("引き分け", `${prefix}\n同点だった。まあいいか`);
    }
  }

  elStartBtn.onclick = startGame;
  elRestartBtn.onclick = startGame;

  render();
})();
</script>
</body>
</html>
