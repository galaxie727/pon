<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>デカブサジャラポン × チー娘</title>

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:sans-serif;
  text-align:center;
}

#app{
  max-width:420px;
  margin:auto;
  padding:10px;
}

#turn{
  font-size:20px;
  margin:10px 0;
}

#board{
  height:120px;
  border:1px solid #444;
  margin:10px 0;
  display:flex;
  justify-content:center;
  align-items:center;
}

#hand{
  display:flex;
  justify-content:center;
  gap:6px;
  margin:10px 0;
}

.tile{
  width:50px;
  height:70px;
  background:#222;
  border:1px solid #555;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
  cursor:pointer;
}

#cutin{
  position:fixed;
  inset:0;
  background:#000;
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  font-size:24px;
  z-index:999;
}

#result{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.9);
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:999;
}

button{
  padding:10px 20px;
  font-size:16px;
}
</style>
</head>

<body>
<div id="app">

<h1>デカブサジャラポン × チー娘</h1>

<div id="turn"></div>
<div id="board">山札</div>

<div id="hand"></div>

<button onclick="draw()">ツモ</button>

</div>

<div id="cutin"></div>
<div id="result"></div>

<script>

const chars = [
"デカブサ","デカブサ兄","ナマケン","トラさん",
"キング","ゴリさん","カバオ","カンえもん","パンパン"
];

let players = [];
let turnOrder = [];
let turnIndex = 0;

let roundIndex = 0;
const rounds = ["東","南","西","北"];

let deck = [];

function shuffle(array){
  return array.sort(()=>Math.random()-0.5);
}

function initPlayers(){
  players = shuffle([
    {name:"あなた",score:3,isPlayer:true},
    {name:"チー娘A",score:3},
    {name:"チー娘B",score:3},
    {name:"チー娘C",score:3}
  ]);

  const seats=["東","南","西","北"];

  players.forEach((p,i)=>{
    p.seat = seats[i];
  });

  turnOrder = ["東","南","西","北"].map(s=>players.find(p=>p.seat===s));
}

function initDeck(){
  deck=[];
  for(let i=0;i<4;i++){
    chars.forEach(c=>deck.push(c));
  }
  shuffle(deck);
}

function deal(){
  players.forEach(p=>{
    p.hand = deck.splice(0,5);
  });
}

function showTurn(){
  const p = turnOrder[turnIndex];
  document.getElementById("turn").innerText =
    `${p.seat} ${p.name} のターン`;
}

function renderHand(){
  const p = turnOrder[turnIndex];
  const handDiv = document.getElementById("hand");
  handDiv.innerHTML="";

  if(!p.isPlayer) return;

  p.hand.forEach((t,i)=>{
    const div=document.createElement("div");
    div.className="tile";
    div.innerText=t;
    div.onclick=()=>discard(i);
    handDiv.appendChild(div);
  });
}

function draw(){
  const p = turnOrder[turnIndex];

  if(deck.length===0){
    nextRound(false);
    return;
  }

  p.hand.push(deck.pop());

  if(checkWin(p)){
    win(p,null,true);
    return;
  }

  if(!p.isPlayer){
    setTimeout(()=>{
      discard(Math.floor(Math.random()*p.hand.length));
    },500);
  }else{
    renderHand();
  }
}

function discard(i){
  const p = turnOrder[turnIndex];
  const tile = p.hand.splice(i,1)[0];

  // ロン判定
  for(let other of players){
    if(other!==p){
      other.hand.push(tile);
      if(checkWin(other)){
        win(other,p,false);
        return;
      }
      other.hand.pop();
    }
  }

  nextTurn();
}

function checkWin(p){
  const count={};
  p.hand.forEach(t=>{
    count[t]=(count[t]||0)+1;
  });

  return Object.values(count).some(v=>v>=3);
}

function win(winner,loser,isTsumo){

  if(isTsumo){
    players.forEach(p=>{
      if(p!==winner){
        p.score--;
        winner.score++;
      }
    });
  }else{
    loser.score-=2;
    winner.score+=2;
  }

  showCutin(`${winner.name} ${isTsumo?"ツモ":"ロン"}`);

  setTimeout(()=>{
    checkEnd(winner);
  },1500);
}

function showCutin(text){
  const c=document.getElementById("cutin");
  c.style.display="flex";
  c.innerText=text;

  setTimeout(()=>{
    c.innerText="...";
  },800);

  setTimeout(()=>{
    c.style.display="none";
  },1500);
}

function checkEnd(winner){

  // ハコテン
  if(players.some(p=>p.score<=0)){
    showResult();
    return;
  }

  // 親継続判定
  const parent = turnOrder[0];

  if(winner === parent){
    startRound(); // 連荘
  }else{
    roundIndex++;
    if(roundIndex>=4){
      showResult();
    }else{
      startRound();
    }
  }
}

function nextTurn(){
  turnIndex = (turnIndex+1)%4;
  showTurn();

  const p = turnOrder[turnIndex];

  if(!p.isPlayer){
    setTimeout(draw,800);
  }
}

function startRound(){
  initDeck();
  deal();
  turnIndex=0;

  showCutin(`${rounds[roundIndex]}局 開始`);

  setTimeout(()=>{
    showTurn();
    renderHand();

    const p = turnOrder[turnIndex];
    if(!p.isPlayer){
      setTimeout(draw,800);
    }

  },1500);
}

function showResult(){
  const r=document.getElementById("result");
  r.style.display="flex";

  const sorted=[...players].sort((a,b)=>b.score-a.score);

  r.innerHTML = `
    <h2>結果</h2>
    ${sorted.map(p=>`${p.name} ${p.score}点`).join("<br>")}
    <br><br>
    <button onclick="location.reload()">もう一回</button>
  `;
}

function startGame(){
  initPlayers();
  startRound();
}

startGame();

</script>
</body>
</html>
