<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>デカブサドンジャラ</title>

<style>
body{
  margin:0;
  background:#0b0e14;
  color:#fff;
  font-family:sans-serif;
}
.app{
  max-width:420px;
  margin:auto;
  padding:10px;
}
.title{
  text-align:center;
  font-weight:900;
  margin-bottom:10px;
}

/* 上部 */
.top{
  display:flex;
  gap:10px;
}
.box{
  flex:1;
  background:#1a1f2b;
  border-radius:16px;
  padding:10px;
  text-align:center;
}
.count{
  font-size:32px;
  font-weight:900;
}

/* 捨て牌 */
.river{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:6px;
}
.tile{
  height:28px;
  border-radius:6px;
}
.last{
  outline:2px solid #fff;
}

/* 相手 */
.cpu{
  display:flex;
  gap:6px;
  margin:10px 0;
}
.cpu div{
  flex:1;
  background:#1a1f2b;
  padding:8px;
  border-radius:12px;
  text-align:center;
}

/* 手札 */
.hand{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
}
.card{
  width:80px;
  height:80px;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
  font-weight:900;
  border:2px solid #333;
}

/* アップ演出 */
.cut{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.8);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:32px;
  font-weight:900;
  opacity:0;
  pointer-events:none;
  transition:.2s;
}
.cut.show{
  opacity:1;
}

/* ボタン */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  margin-top:10px;
  font-weight:900;
}
</style>
</head>

<body>
<div class="app">

<div class="title">デカブサドンジャラ</div>

<div class="top">
  <div class="box">
    山札
    <div class="count" id="deck">0</div>
  </div>

  <div class="box">
    捨て牌
    <div class="river" id="river"></div>
  </div>
</div>

<div class="cpu" id="cpu"></div>

<div class="hand" id="hand"></div>

<button onclick="reset()">リセット</button>

</div>

<div class="cut" id="cut"></div>

<script>

/* ===== キャラ ===== */
const TILES = [
 {id:"dekabusa", name:"デカブサ", color:"#e74c3c"},
 {id:"ani", name:"兄", color:"#f1c40f"},
 {id:"namaken", name:"ナマケン", color:"#3498db"},
 {id:"tora", name:"トラ", color:"#2ecc71"},
 {id:"king", name:"キング", color:"#9b59b6"},
 {id:"gori", name:"ゴリ", color:"#8e5c2c"},
 {id:"kabao", name:"カバオ", color:"#e67e22"},
 {id:"kan", name:"カン", color:"#666"},
 {id:"pan", name:"パン", color:"#ff77cc"}
]

/* ===== 状態 ===== */
let deck=[]
let hand=[]
let cpu=[[],[],[]]
let river=[]
let turn=0

/* ===== 初期化 ===== */
function reset(){
  deck=[]
  TILES.forEach(t=>{
    for(let i=0;i<6;i++) deck.push(t.id)
  })
  deck.sort(()=>Math.random()-0.5)

  hand=[]
  cpu=[[],[],[]]
  river=[]
  turn=0

  for(let i=0;i<5;i++){
    hand.push(draw())
    cpu.forEach(c=>c.push(draw()))
  }

  render()
}

/* ===== draw ===== */
function draw(){
  return deck.pop()
}

/* ===== 色取得 ===== */
function getColor(id){
  return TILES.find(t=>t.id==id).color
}
function getName(id){
  return TILES.find(t=>t.id==id).name
}

/* ===== render ===== */
function render(){
  document.getElementById("deck").textContent=deck.length

  /* 捨て牌 */
  const r=document.getElementById("river")
  r.innerHTML=""
  river.forEach((t,i)=>{
    const d=document.createElement("div")
    d.className="tile"+(i==river.length-1?" last":"")
    d.style.background=getColor(t)
    r.appendChild(d)
  })

  /* cpu */
  const c=document.getElementById("cpu")
  c.innerHTML=""
  cpu.forEach((p,i)=>{
    const d=document.createElement("div")
    d.textContent="チー娘"+(i+1)+" "+p.length+"枚"
    c.appendChild(d)
  })

  /* 手札 */
  const h=document.getElementById("hand")
  h.innerHTML=""
  hand.forEach((t,i)=>{
    const d=document.createElement("div")
    d.className="card"
    d.style.background=getColor(t)
    d.textContent=getName(t)
    d.onclick=()=>playerDiscard(i)
    h.appendChild(d)
  })
}

/* ===== アップ演出 ===== */
function showCut(text){
  const c=document.getElementById("cut")
  c.textContent=text
  c.classList.add("show")
  setTimeout(()=>{
    c.classList.remove("show")
  },600)
}

/* ===== プレイヤー捨て ===== */
function playerDiscard(i){
  const t=hand[i]
  showCut(getName(t))

  setTimeout(()=>{
    hand.splice(i,1)
    river.push(t)
    nextTurn()
  },600)
}

/* ===== CPU ===== */
function cpuTurn(){
  const p=cpu[turn-1]

  const t=draw()
  p.push(t)

  let idx=Math.floor(Math.random()*p.length)
  const discard=p.splice(idx,1)[0]

  showCut(getName(discard))

  setTimeout(()=>{
    river.push(discard)
    nextTurn()
  },600)
}

/* ===== ターン ===== */
function nextTurn(){
  render()

  if(deck.length<=0){
    alert("終了")
    return
  }

  if(turn==0){
    hand.push(draw())
    turn=1
    render()
  }else{
    cpuTurn()
    turn++
    if(turn>3) turn=0
  }
}

/* start */
reset()

</script>
</body>
</html>
